  attachTxHandlers(el);
}

// ═══════════════════════════════════════════════════
// TRANSACTIONS
// ═══════════════════════════════════════════════════
function applyFilters(txs){
  return txs.filter(t=>{
    if(!t.date.startsWith(mStr(vmY,vmM))) return false;
    if(fType!=='all'&&t.type!==fType) return false;
    if(fCat!=='all'&&t.cat!==fCat) return false;
    if(fAccount!=='all'&&t.account!==fAccount) return false;
    if(fSearch){const q=fSearch.toLowerCase();if(![t.desc,t.sub,t.note].some(s=>s&&s.toLowerCase().includes(q)))return false;}
    if(fAmtMin!==''){ const mn=parseFloat(fAmtMin); if(Number.isFinite(mn)&&t.amt<mn) return false; }
    if(fAmtMax!==''){ const mx=parseFloat(fAmtMax); if(Number.isFinite(mx)&&t.amt>mx) return false; }
    if(fDateFrom&&t.date<fDateFrom) return false;
    if(fDateTo&&t.date>fDateTo) return false;
    return true;
  });
}
function hasActiveFilters(){return fType!=='all'||fCat!=='all'||fAccount!=='all'||fAmtMin!==''||fAmtMax!==''||fDateFrom!==''||fDateTo!=='';}
function clearAllFilters(){fType='all';fCat='all';fAccount='all';fAmtMin='';fAmtMax='';fDateFrom='';fDateTo='';fSearch='';renderTx();}

function renderTx(){
  const filtered=applyFilters(TXS);
  const inc=sumInc(filtered),exp=sumExp(filtered),net=inc-exp;
  const usedCats=[...new Set(txsFor(vmY,vmM).map(t=>t.cat))];
  const activeFilters=hasActiveFilters();

  let catChips=`<div class="chip ${fCat==='all'?'on':'off'}" onclick="setCF('all')">Tümü</div>`;
  usedCats.forEach(cid=>{const c=gc(cid);catChips+=`<div class="chip ${fCat===cid?'on':'off'}" onclick="setCF('${cid}')">${c.icon} ${c.name}</div>`;});

  const el=document.getElementById('pg-tx');
  el.innerHTML=`
    <div class="pg-hdr"><div class="pg-title">İşlemler</div>
      <div class="pg-actions">
        <button class="icon-btn ${activeFilters||filterOpen?'active-filter':''}" onclick="toggleFilterPanel()">⚡</button>
        <button class="icon-btn" onclick="exportCSV()">⬇</button>
      </div>
    </div>
    <div class="mnav">
      <button class="mnav-btn" onclick="chVM(-1)">‹</button>
      <div class="mnav-label">${mName(vmM)} ${vmY}</div>
      <button class="mnav-btn" onclick="chVM(1)">›</button>
    </div>
    <div class="stat-strip">
      <div class="scard"><div class="scard-label">Gelir</div><div class="scard-val" style="color:var(--green)">${fmt(inc)}</div></div>
      <div class="scard"><div class="scard-label">Gider</div><div class="scard-val" style="color:var(--red)">${fmt(exp)}</div></div>
      <div class="scard"><div class="scard-label">Net</div><div class="scard-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':''}${fmt(net)}</div></div>
      <div class="scard"><div class="scard-label">Adet</div><div class="scard-val">${filtered.length}</div></div>
    </div>
    <div class="filter-panel ${filterOpen?'open':''}" id="filter-panel">
      <div class="fp-row">
        <div><div class="fp-label">Min Tutar</div><input class="fp-input" type="number" placeholder="₺0" value="${fAmtMin}" oninput="fAmtMin=this.value;renderTx()"/></div>
        <div><div class="fp-label">Max Tutar</div><input class="fp-input" type="number" placeholder="Hepsi" value="${fAmtMax}" oninput="fAmtMax=this.value;renderTx()"/></div>
      </div>
      <div class="fp-row">
        <div><div class="fp-label">Başlangıç</div><input class="fp-input" type="date" value="${fDateFrom}" oninput="fDateFrom=this.value;renderTx()"/></div>
        <div><div class="fp-label">Bitiş</div><input class="fp-input" type="date" value="${fDateTo}" oninput="fDateTo=this.value;renderTx()"/></div>
      </div>
      <div class="fp-row">
        <div><div class="fp-label">Hesap</div>
          <select class="fp-input fp-select" onchange="fAccount=this.value;renderTx()">
            <option value="all" ${fAccount==='all'?'selected':''}>Tüm Hesaplar</option>
            ${Object.entries(ACCOUNTS).map(([k,v])=>`<option value="${k}" ${fAccount===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;align-items:flex-end"><button class="fp-clear" onclick="clearAllFilters()">✕ Temizle</button></div>
      </div>
    </div>
    <div class="search-wrap"><input class="search-input" placeholder="Ara…" value="${fSearch}" oninput="setSF(this.value)"/></div>
    <div class="filter-bar">
      <div class="chip ${fType==='all'?'on':'off'}" onclick="setTF('all')">Tümü</div>
      <div class="chip ${fType==='expense'?'on':'off'}" onclick="setTF('expense')">↑ Giderler</div>
      <div class="chip ${fType==='income'?'on':'off'}" onclick="setTF('income')">↓ Gelirler</div>
    </div>
    <div class="filter-bar" style="margin-bottom:10px">${catChips}</div>
    ${filtered.length?renderTxGroups(filtered):`
      <div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sonuç bulunamadı</div><div class="empty-msg">Filtrelerinizi ayarlayın.</div>
      ${activeFilters?`<button class="empty-btn" onclick="clearAllFilters()">Filtreleri Temizle</button>`:''}</div>`}
    <div style="height:8px"></div>`;
  attachTxHandlers(el);
}

function toggleFilterPanel(){filterOpen=!filterOpen;renderTx();}
function chVM(d){vmM+=d;if(vmM>12){vmM=1;vmY++;}if(vmM<1){vmM=12;vmY--;}renderTx();}
function setTF(v){fType=v;renderTx();}function setCF(v){fCat=v;renderTx();}function setSF(v){fSearch=v;renderTx();}

// ═══════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════
function renderStats(){
  const txs=txsFor(smY,smM),inc=sumInc(txs),exp=sumExp(txs),net=inc-exp;
  const sr=inc>0?Math.round((net/inc)*100):0;
  let pm2=smM-1,py2=smY;if(pm2<1){pm2=12;py2--;}
  const ptxs=txsFor(py2,pm2),pinc=sumInc(ptxs),pexp=sumExp(ptxs);
  const expDelta=pexp>0?((exp-pexp)/pexp*100).toFixed(0):null;
  const incDelta=pinc>0?((inc-pinc)/pinc*100).toFixed(0):null;
  const srPrev=pinc>0?Math.round(((pinc-pexp)/pinc)*100):0;

  const byCat={};
  txs.filter(t=>t.type==='expense').forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amt;});
  const catItems=Object.entries(byCat).map(([id,amt])=>({id,amt,cat:gc(id),pct:exp>0?Math.round(amt/exp*100):0})).sort((a,b)=>b.amt-a.amt);

  const allExpTxs=txs.filter(t=>t.type==='expense');
  const biggestTx=allExpTxs.length?allExpTxs.reduce((a,b)=>b.amt>a.amt?b:a,allExpTxs[0]):null;
  const daysInMonth=new Date(smY,smM,0).getDate();
  const daysPassed=smM===CM&&smY===CY?new Date().getDate():daysInMonth;
  const avgDaily=daysPassed>0?exp/daysPassed:0;
  const topCat=catItems[0];
  const srDelta=sr-srPrev;

  let donutSVG='';
  if(catItems.length&&exp>0){
    const r=52,cx=65,cy=65,sw=18,circ=2*Math.PI*r;let off=0,segs='';
    catItems.forEach(it=>{const dash=(it.amt/exp)*circ;segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.cat.color}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>`;off+=dash;});
    donutSVG=`<svg width="130" height="130" style="flex-shrink:0;overflow:visible"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>${segs}<text x="${cx}" y="${cy-7}" text-anchor="middle" font-size="10" fill="var(--text3)" font-family="Geist,sans-serif" font-weight="700" letter-spacing="1">GİDER</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="15" fill="var(--text)" font-family="Geist,sans-serif" font-weight="900">${fmt(exp)}</text></svg>`;
  }
  const legendHTML=catItems.slice(0,6).map(it=>`<div class="dl-item"><div class="dl-dot" style="background:${it.cat.color}"></div><div class="dl-name">${it.cat.icon} ${it.cat.name}</div><div class="dl-right"><div class="dl-pct" style="color:${it.cat.color}">%${it.pct}</div><div class="dl-amt">${fmt(it.amt)}</div></div></div>`).join('');

  const trend=[];
  for(let i=5;i>=0;i--){let m=smM-i,y=smY;if(m<1){m+=12;y--;}const mt=txsFor(y,m);trend.push({label:mShort(m),inc:sumInc(mt),exp:sumExp(mt),cur:(m===smM&&y===smY)});}
  const maxV=Math.max(...trend.map(d=>Math.max(d.inc,d.exp)),1);
  const bw=36,bgap=8,h=100;
  const bars=trend.map((d,i)=>{const x=i*(bw+bgap),ih=Math.max(Math.round(d.inc/maxV*h),d.inc>0?3:0),eh=Math.max(Math.round(d.exp/maxV*h),d.exp>0?3:0),op=d.cur?1:.5;return `<g><rect x="${x}" y="${h-ih}" width="${bw/2-2}" height="${ih}" rx="3" fill="#2DD4A0" opacity="${op}"/><rect x="${x+bw/2+1}" y="${h-eh}" width="${bw/2-2}" height="${eh}" rx="3" fill="#FF6B6B" opacity="${op}"/></g>`;}).join('');
  const svgW=(bw+bgap)*6-bgap;
  const trendLabels=trend.map(d=>`<div class="trend-label" style="width:${bw}px;text-align:center;${d.cur?'color:var(--text);font-weight:900':''}">${d.label}</div>`).join('');

  // Use budget snapshot for selected month
  const bgtSnap=getBudgetForMonth(smY,smM);
  const catRows=catItems.map(it=>{const bgt=bgtSnap[it.id]||0,over=bgt>0&&it.amt>bgt,pct=bgt>0?Math.min(it.amt/bgt*100,100):0;return `<div class="cat-spend-item"><div class="csi-icon" style="background:${it.cat.bg}">${it.cat.icon}</div><div class="csi-body"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div><div class="csi-name">${it.cat.name}</div><div style="font-size:10px;font-weight:700;color:var(--text3)">%${it.pct} harcama</div></div><div class="csi-right"><div class="csi-amt">−${fmt(it.amt)}</div>${bgt>0?`<div class="csi-bgt">/ ${fmt(bgt)}</div>`:''}</div></div>${bgt>0?`<div class="prog-track"><div class="prog-bar" style="width:${pct}%;background:${over?'var(--red)':it.cat.color}"></div></div>`:''}</div></div>`;}).join('');

  const el=document.getElementById('pg-stats');
  el.innerHTML=`
    <div class="pg-hdr"><div class="pg-title">Analiz</div></div>
    <div class="mnav">
      <button class="mnav-btn" onclick="chSM(-1)">‹</button>
      <div class="mnav-label">${mName(smM)} ${smY}</div>
      <button class="mnav-btn" onclick="chSM(1)">›</button>
    </div>
    <div class="stat-strip">
      <div class="scard"><div class="scard-label">Gelir</div><div class="scard-val" style="color:var(--green)">${fmt(inc)}</div>${incDelta!==null?`<div class="scard-delta" style="color:${incDelta>=0?'var(--green)':'var(--red)'};">${incDelta>=0?'↑':'↓'} %${Math.abs(incDelta)}</div>`:''}</div>
      <div class="scard"><div class="scard-label">Gider</div><div class="scard-val" style="color:var(--red)">${fmt(exp)}</div>${expDelta!==null?`<div class="scard-delta" style="color:${expDelta<=0?'var(--green)':'var(--red)'};">${expDelta>=0?'↑':'↓'} %${Math.abs(expDelta)}</div>`:''}</div>
      <div class="scard"><div class="scard-label">Net</div><div class="scard-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':''}${fmt(net)}</div></div>
      <div class="scard"><div class="scard-label">Oran</div><div class="scard-val" style="color:${sr>=20?'var(--green)':sr>=0?'var(--amber)':'var(--red)'}">%${sr}</div>${srPrev?`<div class="scard-delta" style="color:var(--text3)">geçen: %${srPrev}</div>`:''}</div>
    </div>
    <div class="insight-row">
      ${topCat?`<div class="insight-card"><div class="ic-icon" style="background:${topCat.cat.bg}">${topCat.cat.icon}</div><div class="ic-val" style="color:${topCat.cat.color}">${fmt(topCat.amt)}</div><div class="ic-label">En yüksek kategori</div><div class="ic-delta">${topCat.cat.name} · %${topCat.pct}</div></div>`:''}
      ${biggestTx?`<div class="insight-card"><div class="ic-icon" style="background:var(--red-light)">💸</div><div class="ic-val" style="color:var(--red)">${fmt(biggestTx.amt)}</div><div class="ic-label">En büyük gider</div><div class="ic-delta">${biggestTx.desc}</div></div>`:''}
      <div class="insight-card"><div class="ic-icon" style="background:var(--blue-light)">📅</div><div class="ic-val" style="color:var(--blue)">${fmt(avgDaily)}</div><div class="ic-label">Günlük ort. gider</div><div class="ic-delta">${daysPassed} gün izlendi</div></div>
      <div class="insight-card"><div class="ic-icon" style="background:${srDelta>=0?'var(--green-light)':'var(--red-light)'}">${srDelta>=0?'📈':'📉'}</div><div class="ic-val" style="color:${srDelta>=0?'var(--green)':'var(--red)'}">${srDelta>=0?'+':''}%${srDelta}</div><div class="ic-label">Tasarruf değişimi</div><div class="ic-delta">geçen aya göre</div></div>
      <div class="insight-card"><div class="ic-icon" style="background:var(--purple-light)">↻</div><div class="ic-val" style="color:var(--purple)">${txs.filter(t=>t.recurring).length}</div><div class="ic-label">Düzenli işlem</div><div class="ic-delta">bu ayda</div></div>
    </div>
    ${catItems.length?`<div style="padding:0 14px;margin-bottom:14px"><div class="card" style="padding:20px"><div style="font-size:12px;font-weight:800;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px">Harcama Dağılımı</div><div class="donut-wrap">${donutSVG}<div class="donut-legend">${legendHTML}</div></div></div></div>`:''}
    <div style="padding:0 14px;margin-bottom:14px"><div class="card" style="padding:20px"><div style="font-size:12px;font-weight:800;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px">6 Aylık Trend</div><svg width="100%" viewBox="0 0 ${svgW} ${h+4}" style="overflow:visible;display:block">${bars}</svg><div class="trend-labels" style="gap:${bgap}px">${trendLabels}</div><div class="trend-legend"><div class="tl-item"><div class="tl-dot" style="background:#2DD4A0"></div>Gelir</div><div class="tl-item"><div class="tl-dot" style="background:#FF6B6B"></div>Gider</div><div style="flex:1"></div><div style="font-size:10px;font-weight:700;color:var(--text3)">Parlak = seçili ay</div></div></div></div>
    <div style="padding:0 14px 6px;font-size:15px;font-weight:800;letter-spacing:-.02em">Kategoriye Göre</div>
    ${catRows||`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Veri yok</div><div class="empty-msg">Analiz için işlem ekleyin.</div></div>`}
    <div style="height:16px"></div>`;
}
function chSM(d){smM+=d;if(smM>12){smM=1;smY++;}if(smM<1){smM=12;smY--;}renderStats();}

// ═══════════════════════════════════════════════════
// BUDGET
// ═══════════════════════════════════════════════════
function renderBudget(){
  const txs=txsFor(CY,CM);
  const bgt=getCurrentBudget();
  const totalB=Object.values(bgt).reduce((s,v)=>s+v,0);
  const totalS=sumExp(txs);
  const pctTotal=totalB>0?Math.min(totalS/totalB*100,100):0;
  const overCount=CATS.filter(c=>c.id!=='salary').filter(cat=>{
    const b=getBudgetRemaining(cat.id,CY,CM);
    return b&&b.over;
  }).length;

  const cards=CATS.filter(c=>c.id!=='salary').map(cat=>{
    const b=getBudgetRemaining(cat.id,CY,CM);
    const spent=b?b.spent:txs.filter(t=>t.type==='expense'&&t.cat===cat.id).reduce((s,t)=>s+t.amt,0);
    const lim=b?b.lim:0;
    const pct=b?b.pct:0;
    const over=b?b.over:false;
    const warn=lim>0&&pct>=80&&!over;
    const barColor=over?'var(--red)':warn?'var(--amber)':cat.color;
    const badge=lim>0?(over?'<span class="badge badge-red">Aşıldı</span>':warn?'<span class="badge badge-amber">Yaklaşıyor</span>':'<span class="badge badge-green">Yolunda</span>'):'<span class="badge badge-gray">Bütçe yok</span>';
    const presets=[500,1000,2000,3000,5000,8000,10000];

    return `<div class="bgt-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${lim>0?'14px':'10px'}">
        <div style="width:44px;height:44px;border-radius:14px;background:${cat.bg};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${cat.icon}</div>
        <div style="flex:1"><div style="font-size:15px;font-weight:800;margin-bottom:3px">${cat.name}</div>${badge}</div>
        <div style="text-align:right"><div style="font-size:17px;font-weight:900;color:${spent>0?'var(--red)':'var(--text3)'}">${fmt(spent)}</div><div style="font-size:11px;color:var(--text3)">${lim>0?'/ '+fmt(lim):'limit yok'}</div></div>
      </div>
      ${lim>0?`<div class="prog-track"><div class="prog-bar" style="width:${pct}%;background:${barColor}"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);font-weight:700"><span>%${Math.round(pct)} kullanıldı</span><span style="color:${over?'var(--red)':'var(--text3)'}">${over?'−'+fmt(b.remaining)+' aşım':fmt(b.remaining)+' kaldı'}</span></div>`:''}
      <div class="preset-grid">${presets.map(v=>`<button onclick="setBgtUI('${cat.id}',${v})" class="preset-btn ${lim===v?'active':''}">${v>=1000?v/1000+'B':v}</button>`).join('')}</div>
      <div class="bgt-custom-wrap">
        <input class="bgt-custom-input" type="number" min="1" max="100000000" placeholder="Özel ₺" id="bgt-custom-${cat.id}" onkeydown="if(event.key==='Enter')setBgtCustomUI('${cat.id}')"/>
        <button class="bgt-custom-btn" onclick="setBgtCustomUI('${cat.id}')">Ayarla</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pg-budget').innerHTML=`
    <div class="pg-hdr"><div class="pg-title">Bütçe</div></div>
    <div style="padding:0 14px 16px">
      <div class="hero">
        <div class="hero-eyebrow">Aylık Bütçe · ${mName(CM)} ${CY}</div>
        <div class="hero-balance">${fmt(totalB)}</div>
        <div class="hero-balance-sub">${fmt(totalS)} harcandı · %${Math.round(pctTotal)}${overCount>0?` · <span style="color:#F87171">${overCount} aşım</span>`:''}</div>
        <div class="hero-divider"></div>
        <div style="height:10px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden"><div style="height:100%;border-radius:99px;width:${pctTotal}%;background:${pctTotal>=100?'#FF6B6B':pctTotal>=80?'#FFB347':'#2DD4A0'};transition:width .8s ease"></div></div>
      </div>
    </div>
    <div style="padding:0 14px;margin-bottom:12px">
      <div class="backup-row">
        <button class="backup-btn" onclick="exportJSON()">📦 JSON Yedek</button>
        <button class="backup-btn" onclick="document.getElementById('import-file').click()">📥 İçe Aktar</button>
        <button class="backup-btn danger" onclick="resetAllData()">🗑 Sıfırla</button>
      </div>
    </div>
    <div style="padding:0 14px 10px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:15px;font-weight:800">Kategori Bütçeleri</div><div style="font-size:11px;color:var(--text3)">Preset veya özel değer gir</div></div>
    ${cards}
    <div style="height:20px"></div>`;
}

function setBgtUI(catId,v){
  setBudget(catId,v);
  renderBudget();
  toast(`${gc(catId).name} bütçesi: ${fmt(v)}`);
}
function setBgtCustomUI(catId){
  const inp=document.getElementById('bgt-custom-'+catId);
  const v=validateBudgetValue(inp.value);
  if(v===null){toast('Geçersiz değer','error');return;}
  setBudget(catId,v);
  renderBudget();
  toast(`${gc(catId).name} bütçesi: ${fmt(v)}`);
}

function exportCSV(){
  const rows=[['Tarih','Tür','Tutar','Kategori','Alt Kategori','Açıklama','Hesap','Not','Düzenli']];
  [...TXS].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    rows.push([t.date,t.type===('income')?'Gelir':'Gider',t.amt,gc(t.cat).name,t.sub,`"${(t.desc||'').replace(/"/g,'""')}"`,t.account||'',`"${(t.note||'').replace(/"/g,'""')}"`,t.recurring?'Evet':'Hayır']);
  });
  const csv='\ufeff'+rows.map(r=>r.join(',')).join('\n'); // BOM for Excel
  downloadBlob(csv,'text/csv;charset=utf-8',`fina-${todayStr()}.csv`);
  toast('CSV indirildi');
}

function exportJSON(){
  const backup={
    version:4,
    exportDate:new Date().toISOString(),
    txs:TXS,
    budgetHistory:BUDGET_HISTORY,
    cats:CATS,
    recTemplates:REC_TEMPLATES,
  };
  downloadBlob(JSON.stringify(backup,null,2),'application/json',`fina-backup-${todayStr()}.json`);
  toast('JSON yedeği indirildi');
}

function downloadBlob(content,mime,filename){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let data;
      try{ data=JSON.parse(e.target.result); }
      catch(parseErr){ throw new Error('Dosya geçerli bir JSON değil: '+parseErr.message); }

      // Schema check: must have txs array
      if(!data||typeof data!=='object') throw new Error('Geçersiz format: kök nesne bulunamadı');
      if(!Array.isArray(data.txs)) throw new Error('Geçersiz format: "txs" dizisi bulunamadı');

      // Version warning (not blocking)
      const ver=data.version||0;
      if(ver>4) console.warn('Fina: import version',ver,'> current 4 — may have unknown fields');

      // Validate and normalize transactions — reject silently invalid ones
      const importedTxs=data.txs
        .map(normalizeTx)
        .filter(t=>{
          const errs=validateTx(t);
          if(errs.length){ console.warn('Import: skipping tx',t.id,'reasons:',errs); }
          return errs.length===0;
        });

      if(!importedTxs.length) throw new Error('Geçerli işlem bulunamadı (tüm satırlar hatalı)');

      // Confirm before overwrite
      if(!confirm(
        `${importedTxs.length} geçerli işlem içe aktarılacak` +
        (data.txs.length>importedTxs.length ? ` (${data.txs.length-importedTxs.length} hatalı satır atlandı)` : '') +
        '.\n\nMevcut tüm veriler silinecek. Devam?'
      )) return;

      // Apply — in this order so CATMAP is ready before normalizeTx calls gc()
      if(data.cats&&Array.isArray(data.cats)&&data.cats.length>0){
        CATS=data.cats.map(c=>({...c,isSystem:SYS_CAT_IDS.includes(c.id),bg:c.bg||'rgba(128,128,128,.15)'}));
        SYS_CAT_IDS.forEach(sid=>{
          if(!CATS.find(c=>c.id===sid)){
            const def=DEFAULT_CATS.find(c=>c.id===sid);
            if(def) CATS.push({...def});
          }
        });
        CATMAP=buildCatMap();
        saveCats();
      }

      TXS=importedTxs;
      saveTxs();

      if(data.budgetHistory&&typeof data.budgetHistory==='object'&&!Array.isArray(data.budgetHistory)){
        // Sanitize: ensure all budget values are valid numbers
        const cleanBH={};
        for(const [monthKey,catBgts] of Object.entries(data.budgetHistory)){
          if(!/^\d{4}-\d{2}$/.test(monthKey)) continue;
          if(typeof catBgts!=='object'||!catBgts) continue;
          cleanBH[monthKey]={};
          for(const [catId,val] of Object.entries(catBgts)){
            const v=validateBudgetValue(val);
            if(v!==null) cleanBH[monthKey][catId]=v;
          }
        }
        BUDGET_HISTORY=cleanBH;
        // Ensure current month has a budget entry
        if(!BUDGET_HISTORY[mStr(CY,CM)]){
          BUDGET_HISTORY[mStr(CY,CM)]={food:2000,transport:800,housing:10000,health:1500,fun:1000,shopping:2000,edu:500,savings:3000};
        }
        saveBudgetHistory();
      }

      if(data.recTemplates&&Array.isArray(data.recTemplates)){
        // Validate templates: must have id, freq, startDate
        REC_TEMPLATES=data.recTemplates.filter(r=>
          r&&r.id&&VALID_FREQS.includes(r.freq)&&DATE_RE.test(r.startDate)
        );
        saveTemplates();
        processRecurring();
      }

      CATMAP=buildCatMap();
      toast(`${importedTxs.length} işlem içe aktarıldı`,'success');
      render(activePg);
    } catch(err){
      toast('İçe aktarma hatası: '+err.message,'error');
      console.error('Import error:',err);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function resetAllData(){
  if(!confirm('Tüm veriler silinecek. Emin misiniz?')) return;
  if(!confirm('Son onay: Bu işlem geri alınamaz!')) return;
  TXS=[];
  BUDGET_HISTORY={};
  BUDGET_HISTORY[mStr(CY,CM)]={};
  CATS=[...DEFAULT_CATS];
  REC_TEMPLATES=[];
  saveTxs(); saveBudgetHistory(); saveCats(); saveTemplates();
  toast('Tüm veriler silindi','warn');
  render(activePg);
}

const CatEd=(()=>{
  let editingId=null, tempCat={};

  function openModal(cat){
    tempCat={...cat,subs:[...(cat.subs||[])]};
    document.getElementById('cat-modal-title').textContent=cat.id?`Düzenle: ${cat.name}`:'Yeni Kategori';
    renderModalBody();
    document.getElementById('cat-overlay').classList.add('open');
  }

  function renderModalBody(){
    const c=tempCat;
    const emojiHTML=EMOJI_OPTIONS.map(e=>`<button class="emoji-btn ${c.icon===e?'sel':''}" onclick="CatEd._setIcon('${e}')">${e}</button>`).join('');
    const colorHTML=COLOR_OPTIONS.map(col=>`<button class="color-btn ${c.color===col?'sel':''}" style="background:${col}" onclick="CatEd._setColor('${col}')"></button>`).join('');
    const subsHTML=c.subs.map((s,i)=>`<span class="sub-tag" onclick="CatEd._removeSub(${i})" title="Sil">${s} ×</span>`).join('');

    document.getElementById('cat-modal-body').innerHTML=`
      <div style="margin-bottom:14px">
        <div class="field-label">İsim</div>
        <input class="field-input" id="ce-name" value="${c.name||''}" placeholder="Kategori adı" maxlength="25"/>
      </div>
      <div style="margin-bottom:14px">
        <div class="field-label">İkon</div>
        <div class="emoji-grid">${emojiHTML}</div>
      </div>
      <div style="margin-bottom:14px">
        <div class="field-label">Renk</div>
        <div class="color-grid">${colorHTML}</div>
      </div>
      <div style="margin-bottom:14px">
        <div class="field-label">Alt Kategoriler</div>
        <div style="margin-bottom:8px;display:flex;flex-wrap:wrap">${subsHTML||'<span style="color:var(--text3);font-size:12px">Henüz yok</span>'}</div>
        <div style="display:flex;gap:6px">
          <input class="field-input" id="ce-sub-input" placeholder="Alt kategori ekle…" style="font-size:13px;padding:9px 12px" maxlength="30"
            onkeydown="if(event.key==='Enter'){event.preventDefault();CatEd._addSub();}"/>
          <button class="bgt-custom-btn" onclick="CatEd._addSub()">Ekle</button>
        </div>
      </div>
      <button class="save-btn inc-btn" onclick="CatEd._save()">Kaydet</button>
      ${editingId&&!SYS_CAT_IDS.includes(editingId)?`<button class="delete-btn" onclick="CatEd._delete()">Kategoriyi Sil</button>`:''}`;
  }

  return {
    openEdit(id){
      editingId=id;
      const cat=CATS.find(c=>c.id===id);
      if(!cat) return;
      openModal(cat);
    },
    openNew(){
      editingId=null;
      openModal({id:'',name:'',icon:'✨',color:'#9CA3AF',bg:'rgba(156,163,175,.15)',subs:[],isSystem:false});
    },
    close(){ document.getElementById('cat-overlay').classList.remove('open'); editingId=null; },
    _setIcon(e){ tempCat.icon=e; renderModalBody(); },
    _setColor(col){
      tempCat.color=col;
      const hex=col.replace('#','');
      const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
      tempCat.bg=`rgba(${r},${g},${b},.15)`;
      renderModalBody();
    },
    _addSub(){
      const inp=document.getElementById('ce-sub-input');
      const v=inp.value.trim();
      // Prevent duplicate sub-category names
      if(v&&!tempCat.subs.map(s=>s.toLowerCase()).includes(v.toLowerCase())&&tempCat.subs.length<15){
        tempCat.subs.push(v); inp.value=''; renderModalBody();
      } else if(tempCat.subs.map(s=>s.toLowerCase()).includes(v.toLowerCase())){
        toast('Bu alt kategori zaten var','warn');
      }
    },
    _removeSub(i){ tempCat.subs.splice(i,1); renderModalBody(); },
    _save(){
      const name=document.getElementById('ce-name').value.trim();
      if(!name){toast('Kategori adı girin','warn');return;}
      // Prevent duplicate category names (case-insensitive)
      const nameLC=name.toLowerCase();
      const duplicate=CATS.find(c=>c.name.toLowerCase()===nameLC&&c.id!==editingId);
      if(duplicate){toast('Bu isimde bir kategori zaten var','warn');return;}

      tempCat.name=name;
      if(editingId){
        CATS=CATS.map(c=>c.id===editingId?{...c,...tempCat}:c);
        // Update all transactions that reference this category (rename is safe because ID doesn't change)
        toast(`${tempCat.icon} ${tempCat.name} güncellendi`);
      } else {
        const newId='cat_'+gid();
        CATS.push({...tempCat,id:newId,isSystem:false});
        toast(`${tempCat.icon} ${tempCat.name} eklendi`);
      }
      saveCats();
      this.close();
      renderCatEditorPage();
      render(activePg);
    },
    _delete(){
      if(!editingId||SYS_CAT_IDS.includes(editingId)) return;
      if(!confirm('Kategori silinecek. Bu kategorideki tüm işlemler "Diğer" kategorisine taşınacak. Devam?')) return;
      // Reassign transactions to 'other'
      TXS=TXS.map(t=>t.cat===editingId?{...t,cat:'other',sub:safeSub('other',t.sub)}:t);
      saveTxs();
      CATS=CATS.filter(c=>c.id!==editingId);
      saveCats();
      this.close();
      renderCatEditorPage();
      render(activePg);
      toast('Kategori silindi','error');
    }
  };
})();

const S=(()=>{
  let type='expense', cat='food', amtStr='0', editId=null, isRecurring=false;

  function buildNumpad(){
    document.getElementById('numpad').innerHTML=
      ['7','8','9','4','5','6','1','2','3','.','0','⌫'].map(k=>`<button class="nk ${k==='⌫'?'del':''}" onclick="S.numKey('${k}')">${k}</button>`).join('');
  }
  function updateDisplay(){
    const d=document.getElementById('amt-display');
    const v=parseFloat(amtStr)||0;
    d.textContent=v===0?'₺0':'₺'+amtStr.replace(/^0+(\d)/,'$1');
    d.className='amt-display '+(type==='expense'?'exp-c':'inc-c');
    const sub=document.getElementById('amt-sub');
    if(sub) sub.textContent=v>0?`${type==='expense'?'Gider':'Gelir'} · ${fmt2(v)}`:'Tutar girin';
  }
  function buildCatGrid(){
    const cats=type==='income'
      ?CATS.filter(c=>c.id==='salary'||c.id==='other'||!SYS_CAT_IDS.includes(c.id))
      :CATS.filter(c=>c.id!=='salary');
    if(!cats.find(c=>c.id===cat)) cat=cats[0]?.id||'food';
    document.getElementById('cat-grid').innerHTML=cats.map(c=>`<button class="cat-btn ${cat===c.id?'sel':''}" onclick="S.setCat('${c.id}')"><span class="ci">${c.icon}</span><span class="cn">${c.name}</span></button>`).join('');
    buildSubcats();
  }
  function buildSubcats(){
    const c=gc(cat);
    const sw=document.getElementById('subcat-wrap'),ss=document.getElementById('f-subcat');
    if(c.subs&&c.subs.length){ss.innerHTML=c.subs.map(s=>`<option value="${s}">${s}</option>`).join('');sw.style.display='block';}
    else sw.style.display='none';
  }
  function updateToggle(){
    document.getElementById('btn-exp').className='tt-btn'+(type==='expense'?' ae':'');
    document.getElementById('btn-inc').className='tt-btn'+(type==='income'?' ai':'');
    const sb=document.getElementById('save-btn');
    sb.className='save-btn '+(type==='expense'?'exp-btn':'inc-btn');
    sb.textContent=editId?(type==='expense'?'Gideri Güncelle':'Geliri Güncelle'):(type==='expense'?'Gideri Kaydet':'Geliri Kaydet');
    updateDisplay();
  }
  function updateRecurringUI(){
    const tog=document.getElementById('recurring-toggle'),freq=document.getElementById('freq-select');
    tog.className='toggle'+(isRecurring?' on':'');
    freq.className='freq-select'+(isRecurring?' show':'');
    if(isRecurring) updateOccurrencesHint();
  }

  function updateOccurrencesHint(){
    const sel=document.getElementById('f-occurrences');
    const custom=document.getElementById('f-occurrences-custom');
    const hint=document.getElementById('occurrences-hint');
    if(!sel||!hint) return;
    const val=sel.value;
    custom.style.display=(val==='custom')?'block':'none';
    const freq=document.getElementById('f-freq')?.value||'monthly';
    const freqLabel={daily:'gün',weekly:'hafta',monthly:'ay'}[freq]||'tekrar';
    if(val==='0'){
      hint.textContent='Siz durdurana kadar her '+freqLabel+' tekrarlar.';
    } else if(val==='custom'){
      const n=parseInt(custom.value)||'?';
      hint.textContent=n+' '+freqLabel+' boyunca tekrarlar, sonra durur.';
    } else {
      const amt=document.getElementById('amt-display')?.textContent||'';
      hint.textContent=val+' '+freqLabel+' boyunca tekrarlar, sonra otomatik durur.';
    }
  }

  return {
    onOccurrencesChange(){ updateOccurrencesHint(); },
    open(presetCat,presetType,preAmt,preDesc,preSub){
      editId=null;isRecurring=false;
      type=presetType||'expense';cat=presetCat||'food';
      amtStr=preAmt&&Number.isFinite(preAmt)&&preAmt>0?String(preAmt):'0';
      document.getElementById('modal-title').textContent='Yeni İşlem';
      document.getElementById('f-desc').value=preDesc||'';
      document.getElementById('f-date').value=todayStr();
      document.getElementById('f-note').value='';
      document.getElementById('f-account').value='bank';
      document.getElementById('f-freq').value='monthly';
      document.getElementById('f-occurrences').value='0';
      document.getElementById('f-occurrences-custom').value='';
      document.getElementById('f-occurrences-custom').style.display='none';
      document.getElementById('occurrences-hint').textContent='';
      document.getElementById('delete-btn').style.display='none';
      buildNumpad();updateToggle();buildCatGrid();
      if(preSub){setTimeout(()=>{const ss=document.getElementById('f-subcat');if(ss)ss.value=preSub;},50);}
      updateRecurringUI();
      document.getElementById('overlay').classList.add('open');
    },
    openEdit(id){
      const tx=TXS.find(t=>t.id===id);if(!tx)return;
      editId=id;isRecurring=tx.recurring||false;
      type=tx.type;cat=tx.cat;amtStr=String(tx.amt);
      document.getElementById('modal-title').textContent='İşlemi Düzenle';
      document.getElementById('f-desc').value=tx.desc;
      document.getElementById('f-date').value=tx.date;
      document.getElementById('f-note').value=tx.note||'';
      document.getElementById('f-account').value=tx.account||'bank';
      document.getElementById('f-freq').value=tx.freq||'monthly';
      // Restore occurrences from template if available
      const tmpl=tx.recurringId?REC_TEMPLATES.find(r=>r.id===tx.recurringId):null;
      const occ=tmpl&&tmpl.occurrences>0?String(tmpl.occurrences):'0';
      const occSel=document.getElementById('f-occurrences');
      const knownVals=['0','2','3','4','5','6','9','10','12','18','24'];
      if(knownVals.includes(occ)){occSel.value=occ;}
      else if(occ!=='0'){occSel.value='custom';document.getElementById('f-occurrences-custom').value=occ;document.getElementById('f-occurrences-custom').style.display='block';}
      else{occSel.value='0';}
      document.getElementById('delete-btn').style.display='block';
      buildNumpad();updateToggle();buildCatGrid();
      setTimeout(()=>{const ss=document.getElementById('f-subcat');if(ss)ss.value=tx.sub;},50);
      updateRecurringUI();
      document.getElementById('overlay').classList.add('open');
    },
    close(){ document.getElementById('overlay').classList.remove('open');editId=null; },
    setType(t){ type=t;updateToggle();buildCatGrid(); },
    setCat(id){ cat=id;buildCatGrid(); },
    toggleRecurring(){ isRecurring=!isRecurring;updateRecurringUI(); },
    numKey(k){
      if(k==='⌫'){amtStr=amtStr.length>1?amtStr.slice(0,-1):'0';}
      else if(k==='.'){if(!amtStr.includes('.'))amtStr+='.';}
      else{if(amtStr==='0')amtStr=k;else if(amtStr.includes('.')&&amtStr.split('.')[1].length>=2)return;else amtStr+=k;}
      updateDisplay();
    },
    save(){
      const amt=parseFloat(amtStr);
      const desc=document.getElementById('f-desc').value.trim();
      const date=document.getElementById('f-date').value;
      const subEl=document.getElementById('f-subcat');
      const sub=subEl?subEl.value||gc(cat).subs[0]||'':gc(cat).subs[0]||'';
      const note=document.getElementById('f-note').value.trim();
      const account=document.getElementById('f-account').value;
      const freq=document.getElementById('f-freq').value;
      // Read occurrences
      const occSel=document.getElementById('f-occurrences').value;
      let occurrences=0;
      if(occSel==='custom'){
        const cv=parseInt(document.getElementById('f-occurrences-custom').value);
        occurrences=(Number.isFinite(cv)&&cv>0)?cv:0;
      } else {
        occurrences=parseInt(occSel)||0;
      }

      // Validation
      if(!Number.isFinite(amt)||amt<=0){
        const d=document.getElementById('amt-display');d.style.animation='shake .35s';setTimeout(()=>d.style.animation='',400);return;
      }
      if(!desc){
        const di=document.getElementById('f-desc');di.focus();di.style.borderColor='var(--red)';setTimeout(()=>di.style.borderColor='',1500);return;
      }
      if(!DATE_RE.test(date)){toast('Geçersiz tarih','error');return;}
      if(!VALID_ACCOUNTS.includes(account)){toast('Geçersiz hesap','error');return;}

      // Build recurring ID if applicable
      let recurringId=null;
      if(isRecurring){
        if(editId){
          // Keep existing recurringId if editing a recurring tx
          const existing=TXS.find(t=>t.id===editId);
          recurringId=(existing&&existing.recurringId)||gid();
        } else {
          recurringId=gid();
        }
      }

      const txObj={
        id:editId||gid(),
        type,amt,cat,sub,desc,date,note,account,
        recurring:isRecurring,
        recurringId:isRecurring?recurringId:null,
        freq:isRecurring?freq:'',
        occurrences:isRecurring?occurrences:0,
      };

      if(editId){
        // Editing an existing transaction
        if(isRecurring&&recurringId){
          // Ask user: update just this occurrence, or the whole series going forward?
          const updateSeries=confirm(
            'Bu düzenli işlemi güncellemek istiyorsunuz.\n\n' +
            'Tamam → Sadece bu kaydı güncelle\n' +
            'İptal → Tüm seriyi güncelle (gelecek örnekler değişir)'
          );
          if(updateSeries){
            // Update only this single instance; detach it from the series
            // so future processRecurring() won't touch it
            const singleObj={...txObj, recurringId:null, recurring:false, freq:''};
            TXS=TXS.map(t=>t.id===editId?singleObj:t);
          } else {
            // Update the template so future generated instances reflect new values
            TXS=TXS.map(t=>t.id===editId?txObj:t);
            upsertTemplate(txObj);
            // Wipe future auto-generated instances for this series (let processRecurring regenerate)
            const todayD=todayStr();
            TXS=TXS.filter(t=>!(
              t.recurringId===recurringId &&
              t.id!==editId &&
              t.date>todayD    // only future ones — keep past history
            ));
            processRecurring();
          }
        } else {
          TXS=TXS.map(t=>t.id===editId?txObj:t);
        }
        toast('İşlem güncellendi');
      } else {
        TXS=[txObj,...TXS];
        if(isRecurring&&recurringId){
          upsertTemplate(txObj);
          // Generate next instances
          processRecurring();
        }
        toast('İşlem kaydedildi');
      }
      saveTxs();
      this.close();
      render(activePg);
    },
    deleteCurrent(){
      if(!editId)return;
      const tx=TXS.find(t=>t.id===editId);if(!tx)return;
      let msg=`"${tx.desc}" (${fmt(tx.amt)}) silinsin mi?`;
      if(tx.recurring&&tx.recurringId){
        msg+=' Bu düzenli işlemin sadece bu örneği silinecek.';
      }
      if(!confirm(msg))return;
      TXS=TXS.filter(t=>t.id!==editId);
      saveTxs();
      this.close();
      toast('Silindi','error');
      render(activePg);
    }
  };
})();

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)S.close();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){S.close();CatEd.close();}
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open'))S.save();
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderHome();
</script>
